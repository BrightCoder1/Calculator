<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #input {
        font-size: 2rem;
        height: 2rem;
        width: 16rem;

    }

    .container {
        display: flex;
        margin: 10px;

    }

    .button {
        width: 2rem;
        height: 2rem;
        margin: 1rem
    }
</style>

<body>
    <input type="text" id="input">
    <div class="container">
        <button class="button" value="c">C</button>
        <button class="button" value="/">/</button>
        <button class="button" value="*">*</button>
        <button class="button" value="%">%</button>
    </div>    
   
    <div class="container">
        <button class="button" value="7">7</button>
        <button class="button" value="8">8</button>
        <button class="button" value="9">9</button>
        <button class="button" value="*">*</button>
    </div>
    <div class="container">
        <button class="button" value="4">4</button>
        <button class="button" value="5">5</button>
        <button class="button" value="6">6</button>
        <button class="button" value="-">-</button>
    </div>
    <div class="container">
        <button class="button" value="4">1</button>
        <button class="button" value="5">2</button>
        <button class="button" value="6">3</button>
        <button class="button" value="-">+</button>
    </div>
    <div class="container">
        <button class="button" value="00">00</button>
        <button class="button" value="0">0</button>
        <button class="button" value=".">.</button>
        <button class="button" value="=">=</button>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
